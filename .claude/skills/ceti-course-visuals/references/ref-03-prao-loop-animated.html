<style>
@keyframes pulse-p { 0%,100%{opacity:.3} 50%{opacity:1} }
@keyframes pulse-r { 0%,25%{opacity:.3} 37%,62%{opacity:1} 75%,100%{opacity:.3} }
@keyframes pulse-a { 0%,50%{opacity:.3} 62%,87%{opacity:1} 0%,12%{opacity:.3} }
@keyframes pulse-o { 0%,75%{opacity:.3} 87%,100%{opacity:1} 25%,50%{opacity:.3} }
@keyframes flow { to { stroke-dashoffset: -24; } }
.phase-p { animation: pulse-p 4s ease-in-out infinite; }
.phase-r { animation: pulse-r 4s ease-in-out infinite; }
.phase-a { animation: pulse-a 4s ease-in-out infinite; }
.phase-o { animation: pulse-o 4s ease-in-out infinite; }
.flow-line { stroke-dasharray: 8 6; animation: flow 1.2s linear infinite; }
.lbl { font-size: 12px; fill: var(--color-text-secondary); font-family: var(--font-sans); }
.desc { font-size: 11px; fill: var(--color-text-tertiary); font-family: var(--font-sans); }
</style>
<svg width="100%" viewBox="0 0 680 420">
<defs>
  <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Center label -->
<text class="th" x="340" y="200" text-anchor="middle" dominant-baseline="central" style="fill:var(--color-text-tertiary);font-size:13px">PRAO</text>
<text class="ts" x="340" y="218" text-anchor="middle" dominant-baseline="central" style="fill:var(--color-text-tertiary);font-size:11px">cycle</text>

<!-- Animated connector arcs -->
<path class="flow-line phase-p" d="M 340 90 A 130 130 0 0 1 470 210" fill="none" stroke="var(--color-text-info)" stroke-width="2" marker-end="url(#a2)" opacity="0.6"/>
<path class="flow-line phase-r" d="M 470 240 A 130 130 0 0 1 340 360" fill="none" stroke="var(--color-text-success)" stroke-width="2" marker-end="url(#a2)" opacity="0.6"/>
<path class="flow-line phase-a" d="M 310 360 A 130 130 0 0 1 180 240" fill="none" stroke="var(--color-text-warning)" stroke-width="2" marker-end="url(#a2)" opacity="0.6"/>
<path class="flow-line phase-o" d="M 180 210 A 130 130 0 0 1 310 90" fill="none" stroke="var(--color-text-danger)" stroke-width="2" marker-end="url(#a2)" opacity="0.6"/>

<!-- P — Perceive (top) -->
<g class="node phase-p" onclick="sendPrompt('What does the Perceive phase look like in practice for Claude Code?')">
  <rect x="265" y="34" width="150" height="56" rx="10" stroke-width="0.5" class="c-blue"/>
  <text class="th" x="340" y="55" text-anchor="middle" dominant-baseline="central">P — Perceive</text>
  <text class="ts" x="340" y="76" text-anchor="middle">Read files, run tests, git status</text>
</g>

<!-- R — Reason (right) -->
<g class="node phase-r" onclick="sendPrompt('What does the Reason phase look like in Claude Code traces?')">
  <rect x="474" y="174" width="150" height="56" rx="10" stroke-width="0.5" class="c-teal"/>
  <text class="th" x="549" y="195" text-anchor="middle" dominant-baseline="central">R — Reason</text>
  <text class="ts" x="549" y="216" text-anchor="middle">Plan, weigh trade-offs, decide</text>
</g>

<!-- A — Act (bottom) -->
<g class="node phase-a" onclick="sendPrompt('What kinds of tool calls does Claude Code make during the Act phase?')">
  <rect x="265" y="330" width="150" height="56" rx="10" stroke-width="0.5" class="c-amber"/>
  <text class="th" x="340" y="351" text-anchor="middle" dominant-baseline="central">A — Act</text>
  <text class="ts" x="340" y="372" text-anchor="middle">Write file, run bash, call MCP</text>
</g>

<!-- O — Observe (left) -->
<g class="node phase-o" onclick="sendPrompt('What does the Observe phase check after an action?')">
  <rect x="56" y="174" width="150" height="56" rx="10" stroke-width="0.5" class="c-coral"/>
  <text class="th" x="131" y="195" text-anchor="middle" dominant-baseline="central">O — Observe</text>
  <text class="ts" x="131" y="216" text-anchor="middle">Did tests pass? Build succeed?</text>
</g>

<!-- Side annotation: multi-cycle note -->
<rect x="490" y="330" width="162" height="62" rx="8" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="lbl" x="571" y="349" text-anchor="middle">Most real tasks</text>
<text class="lbl" x="571" y="366" text-anchor="middle">run 2–6 cycles.</text>
<text class="desc" x="571" y="383" text-anchor="middle">Looping ≠ failure.</text>

<!-- Side annotation: when to intervene -->
<rect x="30" y="330" width="162" height="62" rx="8" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="lbl" x="111" y="349" text-anchor="middle">Intervene if same</text>
<text class="lbl" x="111" y="366" text-anchor="middle">actions repeat with</text>
<text class="desc" x="111" y="383" text-anchor="middle">no visible progress.</text>
</svg>
